name: Quality gate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run checks
        shell: bash
        run: |
          python -m py_compile scripts/*.py
          bash -n scripts/*.sh
          python3 tests/test_detector.py
